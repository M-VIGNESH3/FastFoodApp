# =============================================================
# Preview Service for User Service (Blue-Green)
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: user-service-preview
  namespace: {{ .Values.global.namespace | default "fastfood" }}
  labels:
    app: user-service
    role: preview
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5001
  selector:
    app: user-service
