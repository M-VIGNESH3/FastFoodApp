# =============================================================
# Argo Rollout — User Service (Blue-Green Strategy)
# =============================================================
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: user-service
  namespace: {{ .Values.global.namespace | default "fastfood" }}
  labels:
    app: user-service
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: fastfoodapp-config
            - secretRef:
                name: fastfoodapp-secret
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}

  strategy:
    blueGreen:
      activeService: user-service-service
      previewService: user-service-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      scaleDownDelayRevisionLimit: 2
