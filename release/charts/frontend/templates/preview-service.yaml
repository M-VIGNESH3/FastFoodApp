# =============================================================
# Preview Service for Frontend (Blue-Green)
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-preview
  namespace: {{ .Values.global.namespace | default "fastfood" }}
  labels:
    app: frontend
    role: preview
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
