# Secret for sensitive data
# Store: JWT_SECRET, JWT_EXPIRE
# Remember: values must be base64 encoded
# Example: echo -n 'jwt_secret_key_2024' | base64

apiVersion: v1
kind: Secret
metadata:
  name: fastfoodapp-secret
type: Opaque
data:
  JWT_SECRET: [BASE64_ENCODED_JWT_SECRET]
  JWT_EXPIRE: [BASE64_ENCODED_JWT_EXPIRE]
