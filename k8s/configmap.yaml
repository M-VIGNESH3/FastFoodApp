# ConfigMap for shared configuration
# Store: service URLs, ports, non-sensitive config
# Keys needed:
#   USER_SERVICE_URL
#   RESTAURANT_SERVICE_URL
#   ORDER_SERVICE_URL
#   MONGO_URI (per service or shared)

apiVersion: v1
kind: ConfigMap
metadata:
  name: fastfoodapp-config
  namespace: fastfood
data:
  API_URL: http://api-gateway:5000
  USER_SERVICE_URL: http://user-service-service:5001
  RESTAURANT_SERVICE_URL: http://restaurant-service-service:5002
  ORDER_SERVICE_URL: http://order-service-service:5003
  MONGO_URI: mongodb://mongodb-service:27017/fastfoodapp
