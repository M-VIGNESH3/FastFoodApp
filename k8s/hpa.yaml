# HorizontalPodAutoscaler (optional, for advanced practice)
# Target: api-gateway-deployment
# Min replicas: 2
# Max replicas: 5
# Target CPU utilization: 70%

apiVersion : v1
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: fastfood
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-Deployment
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 83
  
