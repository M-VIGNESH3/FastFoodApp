# =============================================================
# Argo Rollouts Dashboard
# Exposes the Argo Rollouts UI so you can visually monitor
# blue-green deployments, promote, or rollback.
#
# Access via: kubectl port-forward svc/argo-rollouts-dashboard 3100:3100 -n argo-rollouts
# Then open: http://localhost:3100
# =============================================================
apiVersion: v1
kind: Service
metadata:
  name: argo-rollouts-dashboard
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/name: argo-rollouts-dashboard
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: dashboard
  selector:
    app.kubernetes.io/name: argo-rollouts
