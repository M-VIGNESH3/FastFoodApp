services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fastfood-networks
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "5001:5001"
    networks:
      - fastfood-networks
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/food_delivery_users
      - JWT_SECRET=jwt_secret_key_2024
      - JWT_EXPIRE=7d

  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    ports:
      - "5002:5002"
    networks:
      - fastfood-networks
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/food_delivery_restaurants
      - JWT_SECRET=jwt_secret_key_2024
      - JWT_EXPIRE=7d

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5003:5003"
    networks:
      - fastfood-networks
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/food_delivery_orders
      - JWT_SECRET=jwt_secret_key_2024
      - JWT_EXPIRE=7d

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    networks:
      - fastfood-networks
    depends_on:
      - user-service
      - restaurant-service
      - order-service
    environment:
      - PORT=5000
      - USER_SERVICE_URL=http://user-service:5001
      - RESTAURANT_SERVICE_URL=http://restaurant-service:5002
      - ORDER_SERVICE_URL=http://order-service:5003
      - JWT_SECRET=jwt_secret_key_2024
      - JWT_EXPIRE=7d

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - fastfood-networks
    depends_on:
      - api-gateway

volumes:
  mongo-data:
    driver: local
networks:
  fastfood-networks:
    driver: bridge
